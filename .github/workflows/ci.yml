name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality and tests
    runs-on: ubuntu-latest
    timeout-minutes: 12
    env:
      PYTHONUTF8: "1"
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install ruff
          python -m pip check

      - name: Python fatal-error lint
        run: ruff check . --select E9,F63,F7 --exclude data

      - name: Compile Python
        run: python -m compileall -q app.py dpp_*.py scripts tests

      - name: Check JavaScript syntax
        shell: bash
        run: |
          while IFS= read -r -d '' file; do
            echo "Checking $file"
            node --check "$file"
          done < <(find static -type f -name '*.js' -print0)

      - name: Frontend monolith guard
        run: python scripts/check_frontend_monoliths.py

      - name: Public repository privacy guard
        run: python scripts/check_repo_privacy.py

      - name: Pantry regression checks
        shell: bash
        run: |
          if [[ -f scripts/check_v019_pantry.py ]]; then
            python scripts/check_v019_pantry.py
          fi

      - name: Activity-plan regression checks
        shell: bash
        run: |
          if [[ -f scripts/check_v020_activity_plan.py ]]; then
            python scripts/check_v020_activity_plan.py
          fi

      - name: Public route smoke tests
        run: python -m unittest discover -s tests -v

  docker-smoke:
    name: Docker build and smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build --tag diet-pro-planner:ci .

      - name: Start container
        run: |
          docker run --detach --name dpp-ci --publish 8099:8099 diet-pro-planner:ci

      - name: Wait for health endpoint
        shell: bash
        run: |
          set -Eeuo pipefail
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://127.0.0.1:8099/health > /tmp/health.json; then
              cat /tmp/health.json
              exit 0
            fi
            sleep 2
          done
          docker logs dpp-ci
          exit 1

      - name: Validate health and index
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          data = json.loads(Path('/tmp/health.json').read_text())
          assert data.get('ok') is True, data
          assert data.get('app') == 'Diet Pro Planner', data
          assert str(data.get('version') or '').startswith('v0.0.'), data
          print('Health OK:', data)
          PY
          curl --fail --silent --show-error http://127.0.0.1:8099/ | grep -q 'Diet Pro Planner'

      - name: Container logs on failure
        if: failure()
        run: docker logs dpp-ci
